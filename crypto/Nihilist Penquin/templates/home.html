{% extends "base.html" %}
{% block content %}
<div class="grid">
  <div class="card">
    <h1 class="title">JWT doğrulama servisi</h1>
    <p class="muted">
      Kayıt ol, giriş yap ve JWT al.
      <br><br>
      <code>/api/admin/flag</code> sadece admin içindir.
    </p>
    <p class="muted">Flag formatı: <code>SKYDAYS{snake_case}</code></p>
    <div class="pill">İpucu: <code>/.well-known/public.pem</code></div>
  </div>

  <div class="card">
    <h2 class="title" style="font-size:18px;">Token (localStorage)</h2>
    <pre id="tok">(yok)</pre>
    <div class="row two">
      <button onclick="refreshTokenBox()">Yenile</button>
      <button onclick="clearTokenAndBox()">Sil</button>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>refreshTokenBox()</script>
{% endblock %}
