version: '3.8'

services:
  # 1. Aşama: DevOps Bot Backend'i
  ai-bot:
    build: ./bot-backend
    container_name: ctf_ai_bot
    ports:
      - "8080:8080"
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    networks:
      - ctf-network
  # 2. Aşama: Mock AWS IMDS Sunucusu
  mock-aws-metadata:
    image: nginx:alpine
    container_name: mock_imds
    volumes:
      - ./mock-imds/html:/usr/share/nginx/html:ro
      - ./mock-imds/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      ctf-network:
        aliases:
          - aws-metadata.internal
  # 3. Aşama: Gerçek ELK Yığını (Log Avı İçin)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.22
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms4g -Xmx4g
      - action.destructive_requires_name=true
    ports:
      - "9200"
    networks:
      - ctf-network

  kibana:
    image: docker.elastic.co/kibana/kibana:7.17.22
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      # NGINX ile subdomain kullanacağımız için burayı alan adınla değiştirdik:
      - SERVER_PUBLICBASEURL=https://kibana.skydays.ctf
    ports:
      - "5601"
    depends_on:
      - elasticsearch
    networks:
      - ctf-network

  log_seeder:
    image: python:3.9-slim
    container_name: log_seeder
    volumes:
      - ./seed_logs.py:/app/seed_logs.py
    # Kütüphane eksikliğini giderdik
    command: sh -c "pip install requests 'elasticsearch>=7.0.0,<8.0.0' && python /app/seed_logs.py"
    depends_on:
      - elasticsearch
    networks:
      - ctf-network

networks:
  ctf-network:
    external: true
